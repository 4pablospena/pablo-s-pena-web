<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pablo Suárez Peña — Desarrollador Frontend especializado en Vue.js, TypeScript y desarrollo web moderno." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Pablo Suárez Peña — Frontend Developer</title>
    <meta name="darkreader-lock" />
  </head>
  <body class="relative text-black dark:text-white">
    <!-- Gradient orbs -->
    <div class="fixed inset-0 z-[-2] bg-white dark:bg-[#09090b]"></div>
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
      <div class="absolute -top-40 -right-40 w-[600px] h-[600px] rounded-full bg-cyan-400/10 dark:bg-cyan-500/5 blur-[120px]"></div>
      <div class="absolute top-1/2 -left-40 w-[500px] h-[500px] rounded-full bg-blue-400/8 dark:bg-blue-500/4 blur-[100px]"></div>
      <div class="absolute -bottom-20 right-1/4 w-[400px] h-[400px] rounded-full bg-teal-300/6 dark:bg-teal-500/3 blur-[100px]"></div>
      <!-- Dot grid -->
      <div class="absolute inset-0 bg-[radial-gradient(circle,rgba(0,0,0,0.06)_1px,transparent_1px)] dark:bg-[radial-gradient(circle,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:24px_24px]"></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
